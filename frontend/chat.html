<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLM — Conciergerie & Messagerie</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --bg:#0e0e0e; --panel:#161616; --panel2:#1e1e1e;
  --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.1);
  --primary:#ff6a00; --primary2:#ffb84d;
  --text:#e8e8e8; --muted:#777; --muted2:#555;
  --success:#10b981; --danger:#ef4444; --info:#3b82f6;
  --msg-out:linear-gradient(135deg,#ff6a00,#e65c00);
  --msg-in:#212121;
  --radius:18px; --radius-sm:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer;border:none}
input,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

/* ─── TOP BAR ─── */
.topbar{height:56px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100}
.topbar-logo{font-size:18px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--primary),var(--primary2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-sub{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.topbar-actions{margin-left:auto;display:flex;gap:8px}
.tb-btn{background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--text);padding:7px 14px;border-radius:10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:.15s;cursor:pointer}
.tb-btn:hover{background:rgba(255,106,0,.12);border-color:rgba(255,106,0,.3);color:var(--primary)}
.tb-btn.active{background:rgba(255,106,0,.15);border-color:var(--primary);color:var(--primary)}

/* ─── LAYOUT ─── */
.chat-layout{display:flex;flex:1;overflow:hidden}

/* ─── SIDEBAR ─── */
.sidebar{width:300px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-hdr{padding:16px;border-bottom:1px solid var(--border)}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 38px;color:var(--text);font-size:13px}
.search-wrap input:focus{border-color:var(--primary);background:rgba(255,106,0,.05)}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px}

.contact-list{flex:1;overflow-y:auto;padding:8px 0}
.contact-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:.15s;position:relative}
.contact-item:hover{background:rgba(255,255,255,.04)}
.contact-item.active{background:rgba(255,106,0,.08);border-left:3px solid var(--primary)}
.contact-item.active .c-name{color:var(--primary)}
.c-avatar{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;position:relative}
.c-avatar.online::after{content:'';position:absolute;bottom:2px;right:2px;width:11px;height:11px;border-radius:50%;background:var(--success);border:2px solid var(--panel)}
.c-avatar.bot::after{content:'';position:absolute;bottom:2px;right:2px;width:11px;height:11px;border-radius:50%;background:#a855f7;border:2px solid var(--panel)}
.c-body{flex:1;min-width:0}
.c-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.c-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.c-time{font-size:10px;color:var(--muted2)}
.c-badge{background:var(--primary);color:white;font-size:10px;font-weight:800;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.c-badge.hidden{opacity:0}
.contact-item .c-role{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted2)}

/* ─── MAIN CHAT ─── */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Chat header */
.chat-hdr{padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0}
.chat-hdr-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.chat-hdr-info{flex:1}
.chat-hdr-name{font-size:15px;font-weight:800}
.chat-hdr-status{font-size:11px;color:var(--success);margin-top:1px}
.chat-hdr-status.away{color:var(--muted)}
.chat-actions{display:flex;gap:8px;margin-left:auto}
.icon-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:15px;transition:.15s;cursor:pointer}
.icon-btn:hover{background:rgba(255,106,0,.12);border-color:rgba(255,106,0,.4);color:var(--primary)}
.icon-btn.call-btn:hover{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:var(--success)}
.icon-btn.video-btn:hover{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.4);color:var(--info)}

/* Messages area */
.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
.date-separator{text-align:center;font-size:11px;color:var(--muted2);margin:8px 0;position:relative}
.date-separator::before,.date-separator::after{content:'';position:absolute;top:50%;width:calc(50% - 60px);height:1px;background:var(--border)}
.date-separator::before{left:0} .date-separator::after{right:0}

.msg-row{display:flex;align-items:flex-end;gap:8px;max-width:72%;animation:msgIn .25s ease-out}
.msg-row.out{margin-left:auto;flex-direction:row-reverse}
.msg-row.in{margin-right:auto}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.msg-bubble{padding:10px 14px;border-radius:var(--radius);position:relative;max-width:100%;word-break:break-word;line-height:1.55;font-size:14px}
.msg-row.out .msg-bubble{background:var(--msg-out);color:white;border-bottom-right-radius:4px}
.msg-row.in .msg-bubble{background:var(--msg-in);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.msg-meta{font-size:10px;color:rgba(255,255,255,.55);text-align:right;margin-top:4px;display:flex;align-items:center;justify-content:flex-end;gap:4px}
.msg-row.in .msg-meta{color:var(--muted2)}
.msg-status{font-size:11px}
.msg-status.read{color:#60a5fa}

.msg-file{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;margin-top:4px;cursor:pointer;transition:.15s}
.msg-file:hover{background:rgba(255,255,255,.12)}
.msg-file-icon{font-size:20px;color:var(--primary)}
.msg-file-info span{font-size:12px;font-weight:700;display:block}
.msg-file-info small{font-size:10px;color:rgba(255,255,255,.5)}

/* Typing */
.typing-indicator{display:none;align-items:center;gap:8px;padding:0 0 4px}
.typing-indicator.show{display:flex}
.typing-dots{display:flex;gap:4px;padding:10px 14px;background:var(--msg-in);border-radius:var(--radius);border-bottom-left-radius:4px;border:1px solid var(--border)}
.typing-dots span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:typingBounce 1s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* Reactions */
.reactions{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.reaction-chip{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:12px;padding:3px 8px;font-size:12px;cursor:pointer;transition:.15s}
.reaction-chip:hover{background:rgba(255,106,0,.15);border-color:rgba(255,106,0,.4)}

/* ─── INPUT AREA ─── */
.input-area{padding:12px 16px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0}
.input-toolbar{display:flex;gap:6px;margin-bottom:8px}
.tool-btn{background:none;border:none;color:var(--muted);font-size:18px;padding:6px;border-radius:8px;transition:.15s;cursor:pointer}
.tool-btn:hover{color:var(--primary);background:rgba(255,106,0,.1)}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-box{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;color:var(--text);font-size:14px;resize:none;max-height:120px;min-height:44px;transition:.15s;line-height:1.5}
.input-box:focus{border-color:var(--primary);background:rgba(255,106,0,.04)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--msg-out);color:white;display:flex;align-items:center;justify-content:center;font-size:18px;transition:.2s;flex-shrink:0;cursor:pointer}
.send-btn:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(255,106,0,.5)}

/* Emoji picker */
.emoji-picker{background:var(--panel2);border:1px solid var(--border2);border-radius:16px;padding:12px;margin-bottom:8px;display:none;flex-wrap:wrap;gap:6px}
.emoji-picker.show{display:flex}
.emoji-picker span{font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:.1s}
.emoji-picker span:hover{background:rgba(255,255,255,.1);transform:scale(1.2)}

/* ─── CALL OVERLAY ─── */
.call-overlay{position:fixed;inset:0;background:rgba(5,5,5,.95);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.call-overlay.active{display:flex}
.call-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;color:white;box-shadow:0 0 0 16px rgba(255,106,0,.1),0 0 0 32px rgba(255,106,0,.05);animation:callPulse 2s infinite}
@keyframes callPulse{0%,100%{box-shadow:0 0 0 16px rgba(255,106,0,.1),0 0 0 32px rgba(255,106,0,.05)}50%{box-shadow:0 0 0 24px rgba(255,106,0,.08),0 0 0 48px rgba(255,106,0,.03)}}
.call-name{font-size:24px;font-weight:800;margin-top:8px}
.call-status{font-size:13px;color:var(--muted);letter-spacing:2px}
.call-timer{font-size:18px;font-weight:700;color:var(--success);font-family:monospace;letter-spacing:3px;display:none}
.call-controls{display:flex;gap:20px;margin-top:20px}
.call-ctrl{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:.2s}
.call-ctrl:hover{transform:scale(1.1)}
.ctrl-mute{background:rgba(255,255,255,.1);color:var(--text)}
.ctrl-speaker{background:rgba(255,255,255,.1);color:var(--text)}
.ctrl-end{background:var(--danger);color:white}

/* ─── EMAIL MODAL ─── */
.email-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:8888;display:none;align-items:center;justify-content:center;padding:20px}
.email-modal.open{display:flex}
.email-box{background:#1a1a1a;border:1px solid var(--border2);border-radius:20px;padding:32px;width:100%;max-width:540px}
.email-box h3{font-size:18px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.email-box h3 i{color:var(--primary)}
.email-field{margin-bottom:14px}
.email-field label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
.email-field input,.email-field textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px}
.email-field textarea{resize:vertical;min-height:100px}
.email-field input:focus,.email-field textarea:focus{border-color:var(--primary)}
.email-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.btn-email-send{background:linear-gradient(135deg,#ff6a00,#e65c00);color:white;padding:11px 24px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px}
.btn-email-send:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,106,0,.4)}
.btn-email-cancel{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border2);padding:11px 20px;border-radius:10px;font-size:13px;cursor:pointer}

/* ─── FILE PREVIEW ─── */
.file-preview-bar{display:none;align-items:center;gap:10px;padding:8px 14px;background:rgba(255,106,0,.08);border:1px solid rgba(255,106,0,.2);border-radius:10px;margin-bottom:8px;font-size:12px}
.file-preview-bar.show{display:flex}
.file-preview-bar .fname{flex:1;color:var(--text);font-weight:600}
.file-remove{background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:2px}

/* ─── VOICE MEMO ─── */
.recording-bar{display:none;align-items:center;gap:12px;padding:10px 14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:var(--radius);margin-bottom:8px}
.recording-bar.show{display:flex}
.rec-dot{width:10px;height:10px;background:var(--danger);border-radius:50%;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:.3}}
.rec-time{font-size:14px;font-weight:700;font-family:monospace;color:var(--danger)}
.rec-cancel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-left:auto}

/* ─── NO CHAT SELECTED ─── */
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted)}
.empty-chat i{font-size:60px;opacity:.2}
.empty-chat h3{font-size:18px;font-weight:700;opacity:.5}
.empty-chat p{font-size:13px;opacity:.4}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:80px;right:20px;background:#1a1a1a;border:1px solid var(--border2);border-radius:12px;padding:12px 18px;font-size:13px;z-index:99999;opacity:0;transform:translateY(10px);transition:.3s;max-width:280px}
.toast.show{opacity:1;transform:none}
.toast.success{border-color:rgba(16,185,129,.4);color:var(--success)}
.toast.error{border-color:rgba(239,68,68,.4);color:var(--danger)}

@media(max-width:700px){
  .sidebar{width:72px}
  .c-body,.c-meta,.sidebar-hdr .search-wrap{display:none}
  .c-avatar{margin:0 auto}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="topbar-logo">SLM</div>
    <div class="topbar-sub">Conciergerie Privée</div>
  </div>
  <div class="topbar-actions">
    <button class="tb-btn" onclick="openEmailModal()"><i class="fas fa-envelope"></i> Composer un email</button>
    <button class="tb-btn" id="btnNewContact" onclick="promptNewContact()"><i class="fas fa-user-plus"></i> Nouveau</button>
    <a href="slm-market-enterprise.html" class="tb-btn"><i class="fas fa-store"></i> Boutique</a>
  </div>
</div>

<!-- LAYOUT -->
<div class="chat-layout">

  <!-- SIDEBAR CONTACTS -->
  <div class="sidebar">
    <div class="sidebar-hdr">
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Rechercher..." id="contactSearch" oninput="filterContacts(this.value)">
      </div>
    </div>
    <div class="contact-list" id="contactList"></div>
  </div>

  <!-- MAIN CHAT -->
  <div class="chat-main" id="chatMain">
    <div class="empty-chat" id="emptyChat">
      <i class="fas fa-comments"></i>
      <h3>Messagerie SLM</h3>
      <p>Sélectionnez une conversation pour commencer</p>
    </div>

    <div id="chatView" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden">
      <!-- Chat header -->
      <div class="chat-hdr" id="chatHdr">
        <div class="chat-hdr-avatar" id="hdrAvatar"></div>
        <div class="chat-hdr-info">
          <div class="chat-hdr-name" id="hdrName">—</div>
          <div class="chat-hdr-status" id="hdrStatus">En ligne</div>
        </div>
        <div class="chat-actions">
          <div class="icon-btn call-btn" onclick="startCall('voice')" title="Appel vocal"><i class="fas fa-phone"></i></div>
          <div class="icon-btn video-btn" onclick="startCall('video')" title="Appel vidéo"><i class="fas fa-video"></i></div>
          <div class="icon-btn" onclick="openEmailModal()" title="Envoyer un email"><i class="fas fa-envelope"></i></div>
          <div class="icon-btn" onclick="toggleInfo()" title="Infos"><i class="fas fa-info-circle"></i></div>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages-area" id="messagesArea">
        <div id="typingRow" class="typing-indicator msg-row in">
          <div class="msg-avatar" id="typingAvatar" style="background:#333"></div>
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
      </div>

      <!-- File preview -->
      <div style="padding:0 16px">
        <div class="file-preview-bar" id="filePreviewBar">
          <i class="fas fa-paperclip" style="color:var(--primary)"></i>
          <span class="fname" id="filePreviewName">fichier.pdf</span>
          <button class="file-remove" onclick="cancelFile()"><i class="fas fa-times"></i></button>
        </div>
        <div class="recording-bar" id="recordingBar">
          <div class="rec-dot"></div>
          <span class="rec-time" id="recTime">0:00</span>
          <i class="fas fa-microphone" style="color:var(--danger);margin-left:auto;margin-right:8px"></i>
          <button class="rec-cancel" onclick="cancelRecording()"><i class="fas fa-times"></i> Annuler</button>
        </div>
        <div class="emoji-picker" id="emojiPicker">
          <span onclick="insertEmoji('😊')">😊</span><span onclick="insertEmoji('😂')">😂</span>
          <span onclick="insertEmoji('❤️')">❤️</span><span onclick="insertEmoji('🔥')">🔥</span>
          <span onclick="insertEmoji('💎')">💎</span><span onclick="insertEmoji('✅')">✅</span>
          <span onclick="insertEmoji('👍')">👍</span><span onclick="insertEmoji('👑')">👑</span>
          <span onclick="insertEmoji('💰')">💰</span><span onclick="insertEmoji('🚀')">🚀</span>
          <span onclick="insertEmoji('⭐')">⭐</span><span onclick="insertEmoji('🛍️')">🛍️</span>
          <span onclick="insertEmoji('📦')">📦</span><span onclick="insertEmoji('🎁')">🎁</span>
          <span onclick="insertEmoji('😍')">😍</span><span onclick="insertEmoji('🙏')">🙏</span>
          <span onclick="insertEmoji('💯')">💯</span><span onclick="insertEmoji('🤝')">🤝</span>
          <span onclick="insertEmoji('⚡')">⚡</span><span onclick="insertEmoji('🌟')">🌟</span>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-toolbar">
          <button class="tool-btn" onclick="toggleEmoji()" title="Emoji"><i class="fas fa-smile"></i></button>
          <button class="tool-btn" onclick="attachFile()" title="Fichier"><i class="fas fa-paperclip"></i></button>
          <button class="tool-btn" id="micBtn" onclick="toggleRecording()" title="Message vocal"><i class="fas fa-microphone"></i></button>
          <button class="tool-btn" onclick="openEmailModal()" title="Email"><i class="fas fa-envelope"></i></button>
          <input type="file" id="fileInput" style="display:none" onchange="handleFileAttach(this)">
        </div>
        <div class="input-row">
          <textarea class="input-box" id="msgInput" placeholder="Message..." rows="1"
            onkeydown="handleMsgKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CALL OVERLAY -->
<div class="call-overlay" id="callOverlay">
  <div class="call-avatar" id="callAvatar">?</div>
  <div class="call-name" id="callName">—</div>
  <div class="call-status" id="callStatus">Appel en cours...</div>
  <div class="call-timer" id="callTimerDisplay">00:00</div>
  <div class="call-controls">
    <div class="call-ctrl ctrl-mute" id="muteBtn" onclick="toggleMute()" title="Micro"><i class="fas fa-microphone"></i></div>
    <div class="call-ctrl ctrl-speaker" onclick="toggleSpeaker()" title="Haut-parleur"><i class="fas fa-volume-up"></i></div>
    <div class="call-ctrl ctrl-end" onclick="endCall()" title="Raccrocher"><i class="fas fa-phone-slash"></i></div>
  </div>
</div>

<!-- EMAIL MODAL -->

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════
// 📇 CONTACTS & CONVERSATIONS
// ════════════════════════════════════════════════════
const CONTACTS = [
  {
    id: 'slm-ai',
    name: 'SLM Assistant IA',
    role: 'Intelligence Artificielle',
    emoji: '🤖',
    color: 'linear-gradient(135deg,#a855f7,#7c3aed)',
    online: true,
    isBot: true,
    preview: 'Bonjour ! Comment puis-je vous aider ?'
  },
  {
    id: 'support',
    name: 'Support Conciergerie',
    role: 'Service Client',
    emoji: '👑',
    color: 'linear-gradient(135deg,#ff6a00,#ffb84d)',
    online: true,
    isBot: false,
    phone: '+225 07 00 00 00',
    email: 'support@slm.market',
    preview: 'Votre commande est prête...'
  },
  {
    id: 'logistics',
    name: 'Équipe Logistique',
    role: 'Livraison & Suivi',
    emoji: '📦',
    color: 'linear-gradient(135deg,#3b82f6,#1d4ed8)',
    online: false,
    isBot: false,
    phone: '+225 01 00 00 00',
    email: 'logistics@slm.market',
    preview: 'Votre colis est en transit'
  },
  {
    id: 'vip',
    name: 'Concierge VIP',
    role: 'Service Exclusif',
    emoji: '💎',
    color: 'linear-gradient(135deg,#f59e0b,#d97706)',
    online: true,
    isBot: false,
    phone: '+225 05 00 00 00',
    email: 'vip@slm.market',
    preview: 'Votre commande privée...'
  },
];

// Load saved contacts (user-added)
function getAllContacts() {
  const custom = JSON.parse(localStorage.getItem('slm_contacts') || '[]');
  return [...CONTACTS, ...custom];
}

let messages = JSON.parse(localStorage.getItem('slm_chat_messages') || '{}');
let currentContactId = null;
let pendingFile = null;
let isRecording = false;
let recInterval = null;
let recSeconds = 0;
let isMuted = false;
let callTimerInterval = null;
let callSeconds = 0;

// ── Init ──
function init() {
  renderContacts();
  // Welcome message in AI chat
  if (!messages['slm-ai']) {
    messages['slm-ai'] = [
      { from: 'them', text: '👋 Bonjour ! Je suis l\'Assistant SLM, votre conseiller d\'achat personnel.\n\nJe peux vous aider avec :\n• Recommandations de produits 🛍️\n• Suivi de commandes 📦\n• Informations sur les marques ✨\n• Conseils mode & tendances 👗\n\nComment puis-je vous aider aujourd\'hui ?', time: now(), status: 'read' }
    ];
    saveMessages();
  }
  if (!messages['support']) {
    messages['support'] = [
      { from: 'them', text: '🌟 Bienvenue sur la Conciergerie SLM !\n\nNous sommes disponibles 7j/7 pour répondre à toutes vos questions.\n\nN\'hésitez pas à nous écrire, appeler ou envoyer un email — nous sommes là pour vous.', time: now(), status: 'read' }
    ];
    saveMessages();
  }
}

function renderContacts(filter = '') {
  const contacts = getAllContacts().filter(c =>
    !filter || c.name.toLowerCase().includes(filter.toLowerCase())
  );
  const html = contacts.map(c => {
    const msgs = messages[c.id] || [];
    const last = msgs[msgs.length - 1];
    const unread = msgs.filter(m => m.from === 'them' && !m.read).length;
    return `
      <div class="contact-item ${currentContactId === c.id ? 'active' : ''}" onclick="openContact('${c.id}')">
        <div class="c-avatar ${c.online ? (c.isBot ? 'bot' : 'online') : ''}"
             style="background:${c.color};color:white;font-size:${c.isBot?'20px':'18px'}">${c.emoji}</div>
        <div class="c-body">
          <div class="c-name">${c.name}</div>
          <div class="c-role">${c.role}</div>
          <div class="c-preview">${last ? last.text.substring(0,40).replace(/\n/g,' ') + (last.text.length>40?'…':'') : c.preview}</div>
        </div>
        <div class="c-meta">
          <div class="c-time">${last ? last.time : ''}</div>
          <div class="c-badge ${unread ? '' : 'hidden'}">${unread||''}</div>
        </div>
      </div>`;
  }).join('');
  document.getElementById('contactList').innerHTML = html;
}

function openContact(id) {
  currentContactId = id;
  const contact = getAllContacts().find(c => c.id === id);
  if (!contact) return;

  // Mark as read
  if (messages[id]) messages[id].forEach(m => { if (m.from === 'them') m.read = true; });
  saveMessages();

  document.getElementById('emptyChat').style.display = 'none';
  const chatView = document.getElementById('chatView');
  chatView.style.display = 'flex';
  chatView.style.flexDirection = 'column';
  chatView.style.overflow = 'hidden';
  chatView.style.flex = '1';

  // Header
  const hdrAvatar = document.getElementById('hdrAvatar');
  hdrAvatar.style.background = contact.color;
  hdrAvatar.style.color = 'white';
  hdrAvatar.textContent = contact.emoji;
  hdrAvatar.style.fontSize = '18px';
  document.getElementById('hdrName').textContent = contact.name;
  const statusEl = document.getElementById('hdrStatus');
  statusEl.textContent = contact.online ? (contact.isBot ? '🟣 IA Active' : '🟢 En ligne') : '⚫ Hors ligne';
  statusEl.className = 'chat-hdr-status' + (contact.online ? '' : ' away');

  renderMessages(id);
  renderContacts(document.getElementById('contactSearch').value);
  document.getElementById('msgInput').focus();
}

function renderMessages(id) {
  const msgs = messages[id] || [];
  const contact = getAllContacts().find(c => c.id === id);
  const area = document.getElementById('messagesArea');
  const typing = document.getElementById('typingRow');
  area.innerHTML = '';
  area.appendChild(typing);

  // Date separator
  if (msgs.length) {
    const sep = document.createElement('div');
    sep.className = 'date-separator';
    sep.textContent = "Aujourd'hui";
    area.insertBefore(sep, typing);
  }

  msgs.forEach(msg => {
    const isOut = msg.from === 'me';
    const row = document.createElement('div');
    row.className = 'msg-row ' + (isOut ? 'out' : 'in');

    let bubbleContent = `<div class="msg-bubble">`;
    bubbleContent += msg.text.replace(/\n/g, '<br>');
    if (msg.file) {
      bubbleContent += `<div class="msg-file"><div class="msg-file-icon"><i class="fas fa-file-alt"></i></div>
        <div class="msg-file-info"><span>${msg.file.name}</span><small>${msg.file.size}</small></div></div>`;
    }
    if (msg.isVoice) {
      bubbleContent += `<div style="display:flex;align-items:center;gap:8px;margin-top:4px">
        <i class="fas fa-play-circle" style="font-size:20px;color:${isOut?'rgba(255,255,255,.8)':'var(--primary)'};cursor:pointer"></i>
        <div style="flex:1;height:3px;background:${isOut?'rgba(255,255,255,.3)':'rgba(255,106,0,.3)'};border-radius:2px">
          <div style="width:${Math.random()*60+20}%;height:100%;background:${isOut?'rgba(255,255,255,.7)':'var(--primary)'};border-radius:2px"></div>
        </div>
        <small style="color:${isOut?'rgba(255,255,255,.6)':'#555'}">${msg.duration||'0:05'}</small>
      </div>`;
    }
    bubbleContent += `<div class="msg-meta">${msg.time}
      ${isOut ? `<span class="msg-status ${msg.status==='read'?'read':''}">
        ${msg.status==='sent'?'✓':msg.status==='delivered'?'✓✓':'<span style="color:#60a5fa">✓✓</span>'}</span>` : ''}
    </div></div>`;

    if (!isOut) {
      row.innerHTML = `<div class="msg-avatar" style="background:${contact?.color||'#333'};color:white;font-size:13px">${contact?.emoji||'?'}</div>${bubbleContent}`;
    } else {
      row.innerHTML = `${bubbleContent}<div class="msg-avatar" style="background:linear-gradient(135deg,#333,#444);color:#aaa;font-size:13px">Moi</div>`;
    }
    area.insertBefore(row, typing);
  });

  area.scrollTop = area.scrollHeight;
}

// ── Send message ──
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text && !pendingFile) return;
  if (!currentContactId) return;

  if (!messages[currentContactId]) messages[currentContactId] = [];

  const msg = {
    from: 'me',
    text: text || (pendingFile ? '📎 Fichier joint' : ''),
    time: now(),
    status: 'sent',
    file: pendingFile || null
  };
  messages[currentContactId].push(msg);
  saveMessages();
  input.value = '';
  input.style.height = '44px';
  cancelFile();
  renderMessages(currentContactId);

  // Simulate delivery/read
  setTimeout(() => { msg.status = 'delivered'; renderMessages(currentContactId); }, 800);
  setTimeout(() => { msg.status = 'read'; renderMessages(currentContactId); }, 1800);

  // Bot or auto-reply
  const contact = getAllContacts().find(c => c.id === currentContactId);
  if (contact?.isBot) {
    showTyping();
    setTimeout(() => {
      hideTyping();
      const reply = generateBotReply(text);
      messages[currentContactId].push({ from:'them', text:reply, time:now(), status:'read' });
      saveMessages();
      renderMessages(currentContactId);
      renderContacts();
    }, 1500 + Math.random() * 1000);
  } else if (contact?.online && Math.random() > 0.4) {
    showTyping();
    setTimeout(() => {
      hideTyping();
      const replies = [
        'Bien reçu, nous traitons votre demande ! 👍',
        'Merci pour votre message. Un conseiller vous répond sous peu.',
        'Votre requête a été enregistrée. Nous vous recontactons rapidement.',
        'Message reçu ✅ Notre équipe prend en charge votre demande.',
      ];
      const r = replies[Math.floor(Math.random() * replies.length)];
      messages[currentContactId].push({ from:'them', text:r, time:now(), status:'read' });
      saveMessages();
      renderMessages(currentContactId);
      renderContacts();
    }, 2000 + Math.random() * 1500);
  }
}

// ── AI Bot ──
function generateBotReply(input) {
  const q = input.toLowerCase();
  if (q.includes('bonjour') || q.includes('salut') || q.includes('hello'))
    return '👋 Bonjour ! Bienvenue chez SLM Market. Je suis votre conseiller personnel.\n\nQue puis-je faire pour vous aujourd\'hui ?';
  if (q.includes('prix') || q.includes('coût') || q.includes('combien'))
    return '💰 Nos prix varient selon la catégorie :\n\n• Parfums luxe : 115 000 – 320 000 FCFA\n• Sneakers : 155 000 – 850 000 FCFA\n• Cheveux raw : 85 000 – 310 000 FCFA\n• Vêtements : 220 000 – 2 500 000 FCFA\n• Tech : 240 000 – 2 800 000 FCFA\n• Bijoux & Montres : 2 600 000 – 65 000 000 FCFA\n\nSouhaitez-vous plus de détails sur une catégorie ?';
  if (q.includes('livraison') || q.includes('délai') || q.includes('shipping'))
    return '📦 Délais de livraison SLM :\n\n• Standard (5–7j) : Gratuite > 500K FCFA\n• Express (48h) : 15 000 FCFA\n• VIP White Glove (24h) : 35 000 FCFA\n\nToutes nos livraisons sont suivies en temps réel.';
  if (q.includes('commande') || q.includes('order') || q.includes('suivi'))
    return '🔍 Pour suivre votre commande :\n\n1. Rendez-vous sur la page "Suivi"\n2. Entrez votre numéro de commande (format ORD-xxx)\n3. Voir l\'état en temps réel\n\nBesoin d\'aide avec une commande spécifique ?';
  if (q.includes('retour') || q.includes('remboursement') || q.includes('échange'))
    return '🔄 Politique de retour SLM :\n\n• Retour accepté sous 7 jours\n• Produit intact dans son emballage original\n• Remboursement sous 3–5 jours ouvrés\n• Échange disponible selon stock\n\nContactez notre concierge VIP pour initier un retour.';
  if (q.includes('parfum') || q.includes('fragrance') || q.includes('dior') || q.includes('creed'))
    return '✨ Notre sélection parfums comprend les plus grandes maisons :\n\nDior · Creed · Tom Ford · Louis Vuitton · Baccarat Rouge 540 · Kilian · Parfums de Marly · Roja Parfums...\n\nTous nos parfums sont 100% authentiques avec certificat d\'authenticité SLM.';
  if (q.includes('sneaker') || q.includes('chaussure') || q.includes('jordan') || q.includes('yeezy') || q.includes('nike'))
    return '👟 Sneakers disponibles :\n\nAir Jordan 4 · Travis Scott · Yeezy 350 · Balenciaga Track · Off-White x Nike · LV Trainer · Dior B22...\n\nStock limité. Je vous conseille de commander rapidement pour les éditions rares.';
  if (q.includes('rolex') || q.includes('montre') || q.includes('cartier') || q.includes('bijou'))
    return '💎 Notre section Horlogerie & Bijoux :\n\nRolex Submariner · Audemars Piguet · Omega · Cartier Love · Van Cleef Alhambra · Tiffany HardWear...\n\nAuthentification garantie. Provenance documentée. Certificats fournis.';
  if (q.includes('iphone') || q.includes('mac') || q.includes('apple') || q.includes('tech'))
    return '📱 Gamme Tech disponible :\n\niPhone 15 Pro Max · MacBook Pro M3 Max · iPad Pro M4 · Apple Watch Ultra 2 · AirPods Max · Sony WH-1000XM5 · DJI Air 3...\n\nProduits neufs, scellés, avec garantie internationale.';
  if (q.includes('négoci') || q.includes('discount') || q.includes('réduction') || q.includes('promo'))
    return '🤝 Codes promo actifs :\n\n• WELCOME25 → -25% sur tout\n• SLM2026 → -25 000 FCFA\n• FIRST10 → -10 000 FCFA (nouveau client)\n• SUMMER50 → -50 000 FCFA (min. 500K)\n\nOu utilisez le bouton "🤖 Négocier" sur n\'importe quel produit pour une offre personnalisée !';
  if (q.includes('merci') || q.includes('thank'))
    return '🙏 Avec plaisir ! N\'hésitez pas si vous avez d\'autres questions.\n\nBonne navigation sur SLM Market ! 🌟';
  if (q.includes('avis') || q.includes('authentique') || q.includes('original'))
    return '✅ Authenticité SLM :\n\nChaque produit passe par notre processus de vérification en 5 étapes :\n\n1. Vérification des codes QR/séries\n2. Contrôle matériaux et finitions\n3. Comparaison bases de données officielles\n4. Photo documentation\n5. Certificat SLM délivré\n\nScore d\'authenticité : 99.8% sur 2 000+ articles vérifiés.';

  // Default
  const defaults = [
    '🤔 Bonne question ! Laissez-moi chercher la meilleure réponse pour vous...\n\nPour ce type de demande spécifique, je vous recommande de contacter directement notre Concierge VIP ou le Support.',
    '💡 Je comprends votre demande. Pour vous donner une réponse précise, pourriez-vous me donner plus de détails ?\n\nJe suis là pour vous aider à trouver exactement ce que vous cherchez.',
    '🌟 Excellente question ! Notre équipe est spécialisée dans ce domaine.\n\nJe note votre demande et un conseiller humain vous contactera sous peu avec une réponse personnalisée.',
  ];
  return defaults[Math.floor(Math.random() * defaults.length)];
}

// ── Typing indicator ──
function showTyping() {
  const typingRow = document.getElementById('typingRow');
  const contact = getAllContacts().find(c => c.id === currentContactId);
  const avatar = document.getElementById('typingAvatar');
  if (contact) {
    avatar.style.background = contact.color;
    avatar.textContent = contact.emoji;
  }
  typingRow.classList.add('show');
  const area = document.getElementById('messagesArea');
  area.scrollTop = area.scrollHeight;
}
function hideTyping() {
  document.getElementById('typingRow').classList.remove('show');
}

// ── Utils ──
function now() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
function saveMessages() {
  localStorage.setItem('slm_chat_messages', JSON.stringify(messages));
}
function filterContacts(v) { renderContacts(v); }

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = '44px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function toggleEmoji() {
  document.getElementById('emojiPicker').classList.toggle('show');
}
function insertEmoji(e) {
  const inp = document.getElementById('msgInput');
  inp.value += e;
  inp.focus();
}

// ── File attach ──
function attachFile() { document.getElementById('fileInput').click(); }
function handleFileAttach(input) {
  const file = input.files[0];
  if (!file) return;
  const sizeKB = (file.size / 1024).toFixed(1);
  pendingFile = { name: file.name, size: sizeKB + ' KB', type: file.type };
  document.getElementById('filePreviewName').textContent = file.name;
  document.getElementById('filePreviewBar').classList.add('show');
  input.value = '';
}
function cancelFile() {
  pendingFile = null;
  document.getElementById('filePreviewBar').classList.remove('show');
}

// ── Voice recording ──
function toggleRecording() {
  if (!isRecording) startRecording();
  else stopRecording();
}
function startRecording() {
  isRecording = true;
  recSeconds = 0;
  document.getElementById('recordingBar').classList.add('show');
  document.getElementById('micBtn').style.color = 'var(--danger)';
  recInterval = setInterval(() => {
    recSeconds++;
    const m = Math.floor(recSeconds / 60);
    const s = recSeconds % 60;
    document.getElementById('recTime').textContent = m + ':' + String(s).padStart(2,'0');
  }, 1000);
}
function stopRecording() {
  isRecording = false;
  clearInterval(recInterval);
  document.getElementById('recordingBar').classList.remove('show');
  document.getElementById('micBtn').style.color = '';
  if (recSeconds > 0 && currentContactId) {
    const m = Math.floor(recSeconds / 60);
    const s = recSeconds % 60;
    if (!messages[currentContactId]) messages[currentContactId] = [];
    messages[currentContactId].push({
      from:'me', text:'🎙️ Message vocal', time:now(), status:'sent',
      isVoice:true, duration:m+':'+String(s).padStart(2,'0')
    });
    saveMessages();
    renderMessages(currentContactId);
  }
  recSeconds = 0;
}
function cancelRecording() {
  isRecording = false;
  clearInterval(recInterval);
  recSeconds = 0;
  document.getElementById('recordingBar').classList.remove('show');
  document.getElementById('micBtn').style.color = '';
}

// ── Calls ──
function startCall(type) {
  if (!currentContactId) return;
  const contact = getAllContacts().find(c => c.id === currentContactId);
  if (!contact) return;

  document.getElementById('callAvatar').textContent = contact.emoji;
  document.getElementById('callAvatar').style.background = contact.color;
  document.getElementById('callName').textContent = contact.name;
  document.getElementById('callStatus').textContent = type === 'video' ? '📹 Appel vidéo en cours...' : '📞 Appel vocal en cours...';
  document.getElementById('callTimerDisplay').style.display = 'none';
  document.getElementById('callOverlay').classList.add('active');

  // Simulate connect after 2s
  setTimeout(() => {
    document.getElementById('callStatus').textContent = type === 'video' ? '📹 Vidéo connectée' : '📞 Connecté';
    document.getElementById('callTimerDisplay').style.display = 'block';
    callSeconds = 0;
    callTimerInterval = setInterval(() => {
      callSeconds++;
      const m = Math.floor(callSeconds / 60);
      const s = callSeconds % 60;
      document.getElementById('callTimerDisplay').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }, 1000);
  }, 2000);
}
function endCall() {
  clearInterval(callTimerInterval);
  document.getElementById('callOverlay').classList.remove('active');
  if (currentContactId && callSeconds > 0) {
    const m = Math.floor(callSeconds / 60);
    const s = callSeconds % 60;
    const dur = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    if (!messages[currentContactId]) messages[currentContactId] = [];
    messages[currentContactId].push({ from:'me', text:`📞 Appel terminé — Durée: ${dur}`, time:now(), status:'read' });
    saveMessages();
    renderMessages(currentContactId);
  }
}
function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  btn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
  btn.style.background = isMuted ? 'rgba(239,68,68,.2)' : '';
  btn.style.color = isMuted ? 'var(--danger)' : '';
}
function toggleSpeaker() {
  showToast('Haut-parleur activé', 'success');
}

// ── Email modal ──
function openEmailModal() {
  const contact = currentContactId ? getAllContacts().find(c => c.id === currentContactId) : null;
  if (contact?.email) document.getElementById('emailTo').value = contact.email;
  document.getElementById('emailModal').classList.add('open');
}
function closeEmailModal() { document.getElementById('emailModal').classList.remove('open'); }
function closeEmailOutside(e) { if (e.target === document.getElementById('emailModal')) closeEmailModal(); }
function sendEmail() {
  const to = document.getElementById('emailTo').value.trim();
  const sub = document.getElementById('emailSubject').value.trim();
  const body = document.getElementById('emailBody').value.trim();
  if (!to || !sub || !body) { showToast('Tous les champs sont requis', 'error'); return; }
  // Use mailto as fallback (works on all devices)
  const mailto = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
  window.open(mailto, '_blank');
  closeEmailModal();
  showToast('Email prêt à envoyer ✓', 'success');
  if (currentContactId) {
    if (!messages[currentContactId]) messages[currentContactId] = [];
    messages[currentContactId].push({ from:'me', text:`📧 Email envoyé à ${to}\nObjet : ${sub}`, time:now(), status:'read' });
    saveMessages();
    renderMessages(currentContactId);
  }
  ['emailTo','emailSubject','emailBody'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
}

// ── New contact ──
function promptNewContact() {
  const name = prompt('Nom du contact :');
  if (!name) return;
  const phone = prompt('Numéro de téléphone (optionnel) :') || '';
  const email = prompt('Email (optionnel) :') || '';
  const custom = JSON.parse(localStorage.getItem('slm_contacts') || '[]');
  const id = 'c-' + Date.now();
  custom.push({ id, name, role: 'Contact', emoji: '👤', color: 'linear-gradient(135deg,#6b7280,#4b5563)', online: false, phone, email, preview: 'Nouveau contact' });
  localStorage.setItem('slm_contacts', JSON.stringify(custom));
  renderContacts();
  showToast(`${name} ajouté`, 'success');
}

// ── Toast ──
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.classList.remove('show'); }, 3000);
}

// ── Toggle info ──
function toggleInfo() {
  if (!currentContactId) return;
  const c = getAllContacts().find(x => x.id === currentContactId);
  if (!c) return;
  let info = `👤 ${c.name}\n📋 ${c.role}`;
  if (c.phone) info += `\n📞 ${c.phone}`;
  if (c.email) info += `\n📧 ${c.email}`;
  alert(info);
}

// ── Start ──
init();
</script>
